name: cloudflare-pages

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: cloudflare-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: daejeon-jamissue-pages
      PUBLIC_APP_BASE_URL: https://api.daejeon.jamissue.com
      PUBLIC_NAVER_MAP_CLIENT_ID: ${{ vars.PUBLIC_NAVER_MAP_CLIENT_ID || '' }}
      PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL || vars.APP_SUPABASE_URL || '' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.APP_SUPABASE_ANON_KEY || '' }}
      CF_PAGES_BRANCH: preview-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prime-node-tooling
        with:
          node-version: "22"
          ghcr-image: ghcr.io/${{ github.repository_owner }}/jamissue-node-cache:node22-latest
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
      - run: npm ci --prefer-offline --no-audit
      - name: Resolve Cloudflare deployment availability
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "can_deploy=true" >> "${GITHUB_OUTPUT}"
          else
            echo "can_deploy=false" >> "${GITHUB_OUTPUT}"
            echo "Cloudflare credentials are unavailable; running build-only Pages validation."
          fi
      - name: Build static frontend
        run: npm run build
      - name: Publish to Cloudflare Pages
        if: steps.cloudflare.outputs.can_deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.74.0 pages deploy infra/nginx/site --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" --branch "${CF_PAGES_BRANCH}"
