name: worker-vendor

on:
  push:
    branches:
      - codex/deploy-stack
    paths:
      - backend/**
      - .github/workflows/worker-vendor.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor-python-modules:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install worker tooling
        run: uv sync --group dev

      - name: Vendor Python modules for Cloudflare Workers
        run: uv run pywrangler sync --force

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-python-modules
          path: backend/python_modules
          if-no-files-found: error

      - name: Commit vendored modules back to deploy branch
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python_modules
          if git diff --cached --quiet; then
            echo "No vendored module changes"
            exit 0
          fi
          git commit -m "chore: vendor python worker modules"
          git push

